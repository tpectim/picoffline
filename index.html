<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>題庫管理後台 (完整匯入/匯出版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-md relative">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">📚 遊戲題庫管理系統</h1>

        <div class="bg-blue-50 p-6 rounded-lg border border-blue-200 mb-8">
            <h2 class="text-xl font-bold text-blue-800 mb-2">批次新增題目</h2>
            
            <div class="bg-white p-3 rounded border border-blue-100 mb-4 text-sm text-gray-700">
                <p class="font-bold text-blue-600 mb-1">💡 檔名自動解析技巧：</p>
                <p>將檔名命名為 <code class="bg-gray-100 px-1 rounded text-pink-600">主題_名稱_類別_屬性1_屬性2_備註.jpg</code> (使用底線分隔)。</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div><label class="block text-sm font-bold mb-1">預設主題</label><input type="text" id="input-theme" class="w-full p-2 border rounded" placeholder="未設定"></div>
                <div><label class="block text-sm font-bold mb-1">預設名稱 (單檔可用)</label><input type="text" id="input-name" class="w-full p-2 border rounded" placeholder="未設定"></div>
                <div><label class="block text-sm font-bold mb-1">預設類別</label><input type="text" id="input-category" class="w-full p-2 border rounded" placeholder="未設定"></div>
                <div><label class="block text-sm font-bold mb-1">預設屬性 1</label><input type="text" id="input-attr1" class="w-full p-2 border rounded" placeholder="未設定"></div>
                <div><label class="block text-sm font-bold mb-1">預設屬性 2</label><input type="text" id="input-attr2" class="w-full p-2 border rounded" placeholder="未設定"></div>
                <div><label class="block text-sm font-bold mb-1">預設備註</label><input type="text" id="input-content" class="w-full p-2 border rounded" placeholder="未設定"></div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold mb-1">上傳圖片 (可一次選取多張 🖼️)</label>
                <input type="file" id="input-file" accept="image/*" multiple class="w-full p-2 border rounded bg-white cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200">
            </div>
            <div class="flex items-center">
                <button onclick="saveQuestions()" id="save-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded shadow transition">
                    批次上傳至 Firebase
                </button>
                <span id="save-status" class="ml-4 text-sm font-bold text-gray-600"></span>
            </div>
        </div>

        <div>
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-xl font-bold text-gray-800">現有題庫列表</h2>
                    <button id="batch-action-btn" onclick="openBatchEditModal()" class="hidden bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded shadow-sm text-sm transition animate-pulse">
                        ✏️ 批次編輯已選取的 <span id="selected-count-badge">0</span> 筆
                    </button>
                    <button id="batch-delete-btn" onclick="batchDelete()" class="hidden bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded shadow-sm text-sm transition">
                        🗑️ 批次刪除
                    </button>
                    <button id="batch-export-btn" onclick="exportSelectedToJson()" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded shadow-sm text-sm transition">
                        📥 匯出 JSON
                    </button>
                </div>
                
                <div class="flex items-center gap-3 w-full md:w-auto">
                    <label class="font-bold text-sm text-gray-600 whitespace-nowrap">篩選主題：</label>
                    <select id="filter-theme" onchange="renderTable()" class="p-2 border border-gray-300 rounded bg-white shadow-sm focus:border-blue-500 w-full md:w-48">
                        <option value="">全部主題</option>
                    </select>

                    <span id="total-count" class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg border border-blue-200 whitespace-nowrap">共 0 題</span>
                    
                    <input type="file" id="import-json-input" accept=".json" class="hidden" onchange="handleImportJson(event)">
                    <button onclick="triggerImport()" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded shadow-sm text-sm transition whitespace-nowrap">
                        📤 匯入 JSON
                    </button>
                    
                    <button onclick="loadQuestions()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded shadow-sm text-sm transition whitespace-nowrap">
                        重新整理
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto shadow-sm border border-gray-200 rounded-lg">
                <table class="min-w-full bg-white">
                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="py-3 px-4 w-12 text-center">
                                <input type="checkbox" id="check-all" onchange="toggleSelectAll(this)" class="w-5 h-5 cursor-pointer accent-blue-600">
                            </th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-600">圖片</th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-600">主題 / 類別</th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-600">名稱</th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-600">屬性 / 備註</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-600">操作</th>
                        </tr>
                    </thead>
                    <tbody id="question-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-2xl mx-4">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 border-b pb-2">編輯題目內容</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div><label class="block text-sm font-bold mb-1">主題</label><input type="text" id="edit-theme" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-bold mb-1">名稱</label><input type="text" id="edit-name" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-bold mb-1">類別</label><input type="text" id="edit-category" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-bold mb-1">備註</label><input type="text" id="edit-content" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-bold mb-1">屬性 1</label><input type="text" id="edit-attr1" class="w-full p-2 border rounded"></div>
                <div><label class="block text-sm font-bold mb-1">屬性 2</label><input type="text" id="edit-attr2" class="w-full p-2 border rounded"></div>
            </div>
            <div class="flex justify-end gap-3 mt-4">
                <button onclick="closeEditModal()" class="px-5 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold rounded transition">取消</button>
                <button onclick="saveEdit()" id="save-edit-btn" class="px-5 py-2 bg-green-500 hover:bg-green-600 text-white font-bold rounded shadow transition">儲存變更</button>
            </div>
        </div>
    </div>

    <div id="batch-edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-2xl mx-4 border-t-8 border-yellow-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">⚡ 批次編輯項目</h2>
            <p class="text-sm text-red-500 font-bold mb-4 border-b pb-2">※ 只有「勾選」的欄位才會被更新並覆蓋原本的資料！</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="flex items-center gap-2"><input type="checkbox" id="batch-check-theme" class="w-5 h-5 accent-yellow-500"><div class="flex-1"><label class="block text-sm font-bold mb-1">統一修改：主題</label><input type="text" id="batch-theme" class="w-full p-2 border rounded"></div></div>
                <div class="flex items-center gap-2"><input type="checkbox" id="batch-check-category" class="w-5 h-5 accent-yellow-500"><div class="flex-1"><label class="block text-sm font-bold mb-1">統一修改：類別</label><input type="text" id="batch-category" class="w-full p-2 border rounded"></div></div>
                <div class="flex items-center gap-2"><input type="checkbox" id="batch-check-attr1" class="w-5 h-5 accent-yellow-500"><div class="flex-1"><label class="block text-sm font-bold mb-1">統一修改：屬性 1</label><input type="text" id="batch-attr1" class="w-full p-2 border rounded"></div></div>
                <div class="flex items-center gap-2"><input type="checkbox" id="batch-check-attr2" class="w-5 h-5 accent-yellow-500"><div class="flex-1"><label class="block text-sm font-bold mb-1">統一修改：屬性 2</label><input type="text" id="batch-attr2" class="w-full p-2 border rounded"></div></div>
                <div class="flex items-center gap-2 md:col-span-2"><input type="checkbox" id="batch-check-content" class="w-5 h-5 accent-yellow-500"><div class="flex-1"><label class="block text-sm font-bold mb-1">統一修改：備註</label><input type="text" id="batch-content" class="w-full p-2 border rounded"></div></div>
            </div>
            <div class="flex justify-end gap-3 mt-4">
                <button onclick="closeBatchEditModal()" class="px-5 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold rounded transition">取消</button>
                <button onclick="saveBatchEdit()" id="save-batch-btn" class="px-5 py-2 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded shadow transition">確定批次更新</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAW30YA99hzb1rgMfcSySzFSKONF_txy74",
            authDomain: "picpic-89881.firebaseapp.com",
            projectId: "picpic-89881",
            storageBucket: "picpic-89881.firebasestorage.app",
            messagingSenderId: "555976169158",
            appId: "1:555976169158:web:f5e05ebc56d95f12b9e9c7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const collectionName = "question_bank";

        let allQuestions = [];
        let editingDocId = null;
        let selectedIds = new Set(); 

        window.onload = loadQuestions;

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsDataURL(file);
            });
        }

        async function saveQuestions() {
            const fileInput = document.getElementById('input-file');
            const statusText = document.getElementById('save-status');
            const saveBtn = document.getElementById('save-btn');
            const files = fileInput.files;

            if (files.length === 0) return alert("請先選擇至少一張圖片！");

            saveBtn.disabled = true;
            saveBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                let successCount = 0;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    statusText.textContent = `處理中... (${i + 1} / ${files.length})`;

                    const fileNameWithoutExt = file.name.replace(/\.[^/.]+$/, "");
                    const parts = fileNameWithoutExt.split('_');

                    let qData = {
                        theme: parts[0] || document.getElementById('input-theme').value || "未分類",
                        name: parts[1] || document.getElementById('input-name').value || fileNameWithoutExt,
                        category: parts[2] || document.getElementById('input-category').value || "",
                        attr1: parts[3] || document.getElementById('input-attr1').value || "",
                        attr2: parts[4] || document.getElementById('input-attr2').value || "",
                        content: parts[5] || document.getElementById('input-content').value || "",
                        original: await readFileAsBase64(file),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    await db.collection(collectionName).add(qData);
                    successCount++;
                }
                statusText.textContent = `✅ 成功上傳 ${successCount} 張圖片！`;
                fileInput.value = ''; 
                loadQuestions(); 
            } catch (error) { statusText.textContent = "❌ 發生錯誤。"; }
            finally { saveBtn.disabled = false; saveBtn.classList.remove('opacity-50', 'cursor-not-allowed'); }
        }

        async function loadQuestions() {
            const listContainer = document.getElementById('question-list');
            listContainer.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-gray-500 font-bold">資料讀取中...</td></tr>';
            try {
                const snapshot = await db.collection(collectionName).orderBy('createdAt', 'desc').get();
                allQuestions = [];
                let themesSet = new Set();
                snapshot.forEach(doc => {
                    let data = doc.data(); data.id = doc.id;
                    allQuestions.push(data);
                    if(data.theme) themesSet.add(data.theme);
                });
                updateThemeDropdown(themesSet);
                selectedIds.clear(); 
                updateBatchUI();
                renderTable(); 
            } catch (error) { listContainer.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-red-500">讀取資料失敗。</td></tr>'; }
        }

        function updateThemeDropdown(themesSet) {
            const select = document.getElementById('filter-theme');
            const current = select.value;
            select.innerHTML = '<option value="">全部主題</option>';
            Array.from(themesSet).sort().forEach(t => {
                const opt = document.createElement('option'); opt.value = t; opt.textContent = t;
                select.appendChild(opt);
            });
            select.value = themesSet.has(current) ? current : "";
        }

        function renderTable() {
            const filterValue = document.getElementById('filter-theme').value;
            const listContainer = document.getElementById('question-list');
            const countDisplay = document.getElementById('total-count');
            selectedIds.clear();
            document.getElementById('check-all').checked = false;
            updateBatchUI();

            let filtered = filterValue === "" ? allQuestions : allQuestions.filter(q => q.theme === filterValue);
            countDisplay.textContent = `共 ${filtered.length} 題`;

            if (filtered.length === 0) {
                listContainer.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-gray-500">目前沒有資料。</td></tr>';
                return;
            }

            listContainer.innerHTML = filtered.map(data => `
                <tr class="hover:bg-blue-50 border-b transition">
                    <td class="py-2 px-4 text-center"><input type="checkbox" value="${data.id}" onchange="handleRowSelect(this)" class="row-checkbox w-5 h-5 cursor-pointer accent-blue-600"></td>
                    <td class="py-2 px-4 w-24"><img src="${data.original}" class="w-16 h-16 object-contain border bg-white rounded shadow-sm"></td>
                    <td class="py-2 px-4"><span class="inline-block bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded-full mb-1 font-bold">${data.theme || '無主題'}</span><br><span class="text-sm text-gray-600 bg-gray-100 px-2 rounded">${data.category || '無類別'}</span></td>
                    <td class="py-2 px-4 font-bold text-gray-800 text-lg">${data.name || '-'}</td>
                    <td class="py-2 px-4 text-sm text-gray-500">
                        ${data.attr1 ? `<span class="bg-blue-50 text-blue-600 px-1 rounded text-xs mr-1 border border-blue-100">${data.attr1}</span>` : ''}
                        ${data.attr2 ? `<span class="bg-blue-50 text-blue-600 px-1 rounded text-xs border border-blue-100">${data.attr2}</span>` : ''}
                        <div class="mt-1 text-gray-400 text-xs">${data.content || ''}</div>
                    </td>
                    <td class="py-2 px-4 text-center whitespace-nowrap"><button onclick="openEditModal('${data.id}')" class="bg-blue-50 hover:bg-blue-500 text-blue-600 hover:text-white border border-blue-200 px-3 py-1 rounded text-sm transition mr-2">✏️ 編輯</button></td>
                </tr>
            `).join('');
        }

        // 批次與選擇邏輯
        function toggleSelectAll(selectAll) {
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.checked = selectAll.checked;
                selectAll.checked ? selectedIds.add(cb.value) : selectedIds.delete(cb.value);
            });
            updateBatchUI();
        }
        function handleRowSelect(checkbox) {
            checkbox.checked ? selectedIds.add(checkbox.value) : selectedIds.delete(checkbox.value);
            document.getElementById('check-all').checked = document.querySelectorAll('.row-checkbox').length === selectedIds.size;
            updateBatchUI();
        }
        function updateBatchUI() {
            const hasSelection = selectedIds.size > 0;
            document.getElementById('batch-action-btn').classList.toggle('hidden', !hasSelection);
            document.getElementById('batch-delete-btn').classList.toggle('hidden', !hasSelection);
            document.getElementById('batch-export-btn').classList.toggle('hidden', !hasSelection);
            document.getElementById('selected-count-badge').textContent = selectedIds.size;
        }

        // 編輯邏輯
        function openEditModal(id) {
            editingDocId = id;
            const q = allQuestions.find(i => i.id === id);
            ['theme','name','category','attr1','attr2','content'].forEach(f => document.getElementById('edit-'+f).value = q[f] || '');
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        async function saveEdit() {
            const btn = document.getElementById('save-edit-btn'); btn.disabled = true;
            const data = {}; ['theme','name','category','attr1','attr2','content'].forEach(f => data[f] = document.getElementById('edit-'+f).value);
            try { await db.collection(collectionName).doc(editingDocId).update(data); closeEditModal(); loadQuestions(); } 
            catch(e) { alert("失敗"); } finally { btn.disabled = false; }
        }

        // 批次操作
        function openBatchEditModal() { document.getElementById('batch-edit-modal').classList.remove('hidden'); }
        function closeBatchEditModal() { document.getElementById('batch-edit-modal').classList.add('hidden'); }
        async function saveBatchEdit() {
            let updates = {};
            ['theme','category','attr1','attr2','content'].forEach(f => {
                if(document.getElementById('batch-check-'+f).checked) updates[f] = document.getElementById('batch-'+f).value;
            });
            if(Object.keys(updates).length === 0) return alert("請勾選欄位");
            const btn = document.getElementById('save-batch-btn'); btn.disabled = true;
            try {
                const batch = db.batch();
                selectedIds.forEach(id => batch.update(db.collection(collectionName).doc(id), updates));
                await batch.commit(); closeBatchEditModal(); loadQuestions();
            } catch(e) { alert("更新失敗"); } finally { btn.disabled = false; }
        }
        async function batchDelete() {
            if(!confirm("確定刪除？")) return;
            try {
                const batch = db.batch();
                selectedIds.forEach(id => batch.delete(db.collection(collectionName).doc(id)));
                await batch.commit(); loadQuestions();
            } catch(e) { alert("刪除失敗"); }
        }

        // --- 匯出功能 ---
        function exportSelectedToJson() {
            const data = allQuestions.filter(q => selectedIds.has(q.id));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `題庫匯出_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        // --- 匯入功能 ---
        function triggerImport() { document.getElementById('import-json-input').click(); }

        async function handleImportJson(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data)) return alert("格式錯誤，請選擇正確的 JSON 陣列檔案。");

                    const statusText = document.getElementById('save-status');
                    statusText.textContent = `準備匯入 ${data.length} 筆資料...`;

                    // 逐筆寫入 Firebase
                    for (let i = 0; i < data.length; i++) {
                        const { id, createdAt, ...cleanData } = data[i]; // 排除舊 ID
                        cleanData.createdAt = firebase.firestore.FieldValue.serverTimestamp(); // 重新賦予建立時間
                        await db.collection(collectionName).add(cleanData);
                        statusText.textContent = `匯入中... (${i + 1} / ${data.length})`;
                    }

                    alert(`成功匯入 ${data.length} 筆資料！`);
                    loadQuestions();
                } catch (err) {
                    alert("匯入失敗，請確認檔案內容。");
                } finally {
                    event.target.value = ''; // 清除輸入框
                    setTimeout(() => statusText.textContent = "", 3000);
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
